<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="screen-orientation" content="landscape">
<title>Depths of the Dark Keep</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0a0a0f; overflow: hidden; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
body { display: flex; justify-content: center; align-items: center; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); height: 100dvh; }
canvas { display: block; cursor: crosshair; image-rendering: pixelated; image-rendering: crisp-edges; max-width: 100%; max-height: 100%; width: auto; height: 100dvh; }

/* Rotate-device overlay for portrait mobile */
#rotate-msg {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #0a0a0f;
  color: #c8a85c;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  text-align: center;
  gap: 20px;
}
#rotate-msg .phone-icon {
  font-size: 64px;
  animation: rotateHint 2s ease-in-out infinite;
}
@keyframes rotateHint {
  0%, 100% { transform: rotate(0deg); }
  30%, 70% { transform: rotate(90deg); }
}
#rotate-msg p { font-size: 16px; padding: 0 30px; line-height: 1.5; }
#rotate-msg .dismiss { font-size: 14px; color: #888; margin-top: 10px; cursor: pointer; padding: 10px 20px; border: 1px solid #444; border-radius: 4px; }

@media (orientation: portrait) and (max-width: 900px) and (hover: none) {
  #rotate-msg { display: flex; }
  #game { display: none; }
}
@media (orientation: landscape), (min-width: 901px), (hover: hover) {
  #rotate-msg { display: none !important; }
  #game { display: block; }
}
</style>
</head>
<body>
<div id="rotate-msg">
  <div class="phone-icon">📱</div>
  <p>Rotate your device to<br><strong>landscape mode</strong><br>to play</p>
  <div class="dismiss" onclick="this.parentElement.style.display='none'; document.getElementById('game').style.display='block';">
    Tap here to play anyway
  </div>
</div>
<canvas id="game"></canvas>
<script>
  // Cache bust: increment version to force reload
  const APP_VERSION = '3';
  const prev = localStorage.getItem('appVersion');
  if (prev && prev !== APP_VERSION) {
    localStorage.setItem('appVersion', APP_VERSION);
    if ('caches' in window) {
      caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }
    location.reload(true);
  } else {
    localStorage.setItem('appVersion', APP_VERSION);
  }

  // Try to lock orientation to landscape
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }

  // Request fullscreen on first touch (hides browser chrome for bigger game area)
  let fullscreenRequested = false;
  document.addEventListener('touchstart', function requestFS() {
    if (fullscreenRequested) return;
    fullscreenRequested = true;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
    document.removeEventListener('touchstart', requestFS);
  }, { passive: true });
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
